<!DOCTYPE html>
<html lang="en">
<head>
  <title>Daily Midnight Sudoku</title>
  
  <style>
    :root {
      --bg-color: #050814;       /* Space Navy Canvas */
      --card-bg: #0A1020;      /* Dark Slate Card */
      --grid-border: #1E293B;  /* Fine Grid Borders */
      --grid-accent: #38BDF8;  /* Cyan Line Accents */
      --text-white: #FFFFFF;   /* Pure Crisp White Numbers */
      --text-muted: #94A3B8;   /* Muted Serif Subtext */
      --cell-selected: #1E3A8A;/* Deep Navy Selected State */
      --cell-hover: #111B30;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-white);
      font-family: 'Times New Roman', Times, serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      overflow-x: hidden;
    }

    .stats-bar {
      width: 100%;
      display: flex;
      justify-content: space-around;
      background: var(--card-bg);
      border: 1px solid var(--grid-border);
      border-radius: 6px;
      padding: 10px 16px;
      margin-bottom: 20px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
    }

    .stat-item { text-align: center; }
    .stat-label { font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted); letter-spacing: 1px; }
    .stat-value { font-size: 1.15rem; font-weight: bold; color: var(--text-white); margin-top: 2px; }

    
    .sudoku-grid {
      display: grid;
      grid-template-columns: repeat(9, 1fr);
      grid-template-rows: repeat(9, 1fr);
      width: 100%;
      aspect-ratio: 1 / 1;
      background-color: var(--grid-border);
      border: 2px solid var(--grid-accent);
      border-radius: 6px;
      overflow: hidden;
      box-shadow: 0 12px 35px rgba(0, 0, 0, 0.75);
    }

    .cell {
      background-color: var(--card-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Times New Roman', Times, serif;
      font-size: 1.6rem;
      font-weight: bold;
      color: #FFFFFF !important;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s ease;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .cell:hover { background-color: var(--cell-hover); }
    .cell.selected { background-color: var(--cell-selected) !important; }
    .cell.given { color: #FFFFFF !important; font-weight: bold; }
    .cell.user-filled { color: var(--grid-accent) !important; font-weight: normal; }
    .cell.error { color: #EF4444 !important; }

    
    .cell[data-col="2"], .cell[data-col="5"] { border-right: 2px solid var(--grid-accent); }
    .cell[data-row="2"], .cell[data-row="5"] { border-bottom: 2px solid var(--grid-accent); }

    
    .numpad {
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      gap: 6px;
      width: 100%;
      margin-top: 20px;
    }

    .num-btn {
      background: var(--card-bg);
      border: 1px solid var(--grid-border);
      color: #FFFFFF;
      padding: 12px 0;
      border-radius: 4px;
      font-family: 'Times New Roman', Times, serif;
      font-size: 1.2rem;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .num-btn:hover {
      border-color: var(--grid-accent);
      color: var(--grid-accent);
    }

    
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(5, 8, 20, 0.92);
      backdrop-filter: blur(8px);
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .modal-card {
      background: var(--card-bg);
      border: 1px solid var(--grid-accent);
      padding: 32px;
      border-radius: 8px;
      text-align: center;
      max-width: 320px;
      color: #FFFFFF;
    }

    .modal-card h2 { font-size: 1.5rem; font-style: italic; margin-bottom: 8px; }
    .score-highlight { font-size: 1.8rem; margin: 16px 0; color: var(--grid-accent); }
  </style>
</head>
<body>

  <div class="container">
    <div class="art-header">
      <svg class="lighthouse-svg" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <polygon points="50,28 5,2 95,2" fill="rgba(56, 189, 248, 0.2)" />
        <polygon points="50,28 0,38 100,38" fill="rgba(56, 189, 248, 0.12)" />
        <circle cx="50" cy="28" r="5" fill="#38BDF8" />
        <path d="M42 34 H58 V42 H42 Z" stroke="#FFFFFF" stroke-width="2" fill="#0A1020" />
        <path d="M40 34 L50 20 L60 34 Z" fill="#FFFFFF" />
        <line x1="42" y1="38" x2="58" y2="38" stroke="#38BDF8" stroke-width="1.5" />
        <path d="M43 42 L37 86 H63 L57 42 Z" stroke="#FFFFFF" stroke-width="2" fill="#0A1020" />
        <path d="M41.5 53 H58.5 M40 66 H60 M38.5 79 H61.5" stroke="#FFFFFF" stroke-width="2" />
        <path d="M28 86 H72 V93 H28 Z" fill="#FFFFFF" />
        <path d="M18 93 C35 91, 65 91, 82 93 L88 97 H12 Z" fill="#1E293B" />
      </svg>


    <div class="stats-bar">
      <div class="stat-item">
        <div class="stat-label">Timer</div>
        <div class="stat-value" id="timer">00:00</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">Errors</div>
        <div class="stat-value" id="mistakes">0 / 3</div>
      </div>
    </div>

    <div class="sudoku-grid" id="board"></div>

    <div class="numpad">
      <button class="num-btn" onclick="inputNumber(1)">1</button>
      <button class="num-btn" onclick="inputNumber(2)">2</button>
      <button class="num-btn" onclick="inputNumber(3)">3</button>
      <button class="num-btn" onclick="inputNumber(4)">4</button>
      <button class="num-btn" onclick="inputNumber(5)">5</button>
      <button class="num-btn" onclick="inputNumber(6)">6</button>
      <button class="num-btn" onclick="inputNumber(7)">7</button>
      <button class="num-btn" onclick="inputNumber(8)">8</button>
      <button class="num-btn" onclick="inputNumber(9)">9</button>
      <button class="num-btn" onclick="eraseNumber()">⌫</button>
    </div>
  </div>

  <div class="modal-overlay" id="winModal">
    <div class="modal-card">
      <h2>Puzzle Solved!</h2>
      <p style="font-style: italic;">Time Elapsed: <span id="finalTime"></span></p>
      <div class="score-highlight" id="finalScore">0 PTS</div>
      <p style="font-size: 0.85rem; color: var(--text-muted); font-style: italic;">Check back at 00:00 UTC for tomorrow's puzzle.</p>
    </div>
  </div>

  <script>
    
    const puzzleBank = [
      {
        initial: [
          [7, 0, 0, 1, 0, 3, 0, 9, 6],
          [3, 5, 0, 0, 6, 2, 0, 0, 7],
          [0, 6, 4, 7, 0, 0, 0, 5, 2],
          [4, 1, 5, 0, 0, 0, 6, 0, 0],
          [0, 9, 0, 0, 3, 0, 0, 4, 0],
          [0, 0, 3, 0, 0, 0, 5, 2, 8],
          [5, 4, 0, 0, 0, 9, 8, 1, 0],
          [9, 0, 0, 8, 1, 0, 0, 7, 5],
          [2, 8, 0, 3, 0, 5, 0, 0, 4]
        ],
        solution: [
          [7, 2, 8, 1, 5, 3, 4, 9, 6],
          [3, 5, 9, 4, 6, 2, 1, 8, 7],
          [1, 6, 4, 7, 9, 8, 3, 5, 2],
          [4, 1, 5, 2, 8, 7, 6, 3, 9],
          [8, 9, 2, 6, 3, 1, 7, 4, 5],
          [6, 7, 3, 9, 4, 1, 5, 2, 8],
          [5, 4, 7, 6, 2, 9, 8, 1, 3],
          [9, 3, 6, 8, 1, 4, 2, 7, 5],
          [2, 8, 1, 3, 7, 5, 9, 6, 4]
        ]
      },
      {
        initial: [
          [0, 0, 0, 2, 6, 0, 7, 0, 1],
          [6, 8, 0, 0, 7, 0, 0, 9, 0],
          [1, 9, 0, 0, 0, 4, 5, 0, 0],
          [8, 2, 0, 1, 0, 0, 0, 4, 0],
          [0, 0, 4, 6, 0, 2, 9, 0, 0],
          [0, 5, 0, 0, 0, 3, 0, 2, 8],
          [0, 0, 9, 3, 0, 0, 0, 7, 4],
          [0, 4, 0, 0, 5, 0, 0, 3, 6],
          [7, 0, 3, 0, 1, 8, 0, 0, 0]
        ],
        solution: [
          [4, 3, 5, 2, 6, 9, 7, 8, 1],
          [6, 8, 2, 5, 7, 1, 4, 9, 3],
          [1, 9, 7, 8, 3, 4, 5, 6, 2],
          [8, 2, 6, 1, 9, 5, 3, 4, 7],
          [3, 7, 4, 6, 8, 2, 9, 1, 5],
          [9, 5, 1, 7, 4, 3, 6, 2, 8],
          [5, 1, 9, 3, 2, 6, 8, 7, 4],
          [2, 4, 8, 9, 5, 7, 1, 3, 6],
          [7, 6, 3, 4, 1, 8, 2, 5, 9]
        ]
      }
    ];


    function getDailyPuzzle() {
      const todayUTC = new Date().toISOString().split('T')[0]; // Format: YYYY-MM-DD
      let hash = 0;
      for (let i = 0; i < todayUTC.length; i++) {
        hash = todayUTC.charCodeAt(i) + ((hash << 5) - hash);
      }
      const index = Math.abs(hash) % puzzleBank.length;
      return puzzleBank[index];
    }

    const currentPuzzleData = getDailyPuzzle();
    const initialPuzzle = currentPuzzleData.initial;
    const solution = currentPuzzleData.solution;

    let selectedCell = null;
    let secondsElapsed = 0;
    let timerInterval = null;
    let mistakes = 0;

    function renderBoard() {
      const boardEl = document.getElementById('board');
      if (!boardEl) return;
      boardEl.innerHTML = '';

      for (let r = 0; r < 9; r++) {
        for (let c = 0; c < 9; c++) {
          const val = initialPuzzle[r][c];
          const cell = document.createElement('div');
          cell.classList.add('cell');
          cell.dataset.row = r;
          cell.dataset.col = c;

          if (val !== 0) {
            cell.innerText = val;
            cell.classList.add('given');
          } else {
            cell.addEventListener('click', () => selectCell(cell));
          }
          boardEl.appendChild(cell);
        }
      }
      startTimer();
    }

    function selectCell(cell) {
      if (selectedCell) selectedCell.classList.remove('selected');
      selectedCell = cell;
      selectedCell.classList.add('selected');
    }

    function inputNumber(num) {
      if (!selectedCell || selectedCell.classList.contains('given')) return;
      
      const r = parseInt(selectedCell.dataset.row);
      const c = parseInt(selectedCell.dataset.col);

      selectedCell.innerText = num;
      selectedCell.classList.add('user-filled');

      if (num !== solution[r][c]) {
        selectedCell.classList.add('error');
        mistakes++;
        document.getElementById('mistakes').innerText = `${mistakes} / 3`;
        if (mistakes >= 3) {
          alert('Game Over! You reached the error limit.');
          resetGame();
        }
      } else {
        selectedCell.classList.remove('error');
        checkWin();
      }
    }

    function eraseNumber() {
      if (!selectedCell || selectedCell.classList.contains('given')) return;
      selectedCell.innerText = '';
      selectedCell.classList.remove('user-filled', 'error');
    }

    function startTimer() {
      clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        secondsElapsed++;
        const m = String(Math.floor(secondsElapsed / 60)).padStart(2, '0');
        const s = String(secondsElapsed % 60).padStart(2, '0');
        document.getElementById('timer').innerText = `${m}:${s}`;
      }, 1000);
    }

    function triggerConfetti() {
      if (typeof confetti === 'function') {
        confetti({
          particleCount: 120,
          spread: 70,
          origin: { y: 0.6 },
          colors: ['#38BDF8', '#FFFFFF', '#1E3A8A', '#F1F5F9']
        });
      }
    }

    function checkWin() {
      const cells = document.querySelectorAll('.cell');
      let filled = 0;
      let hasError = false;

      cells.forEach(c => {
        if (c.innerText !== '') filled++;
        if (c.classList.contains('error')) hasError = true;
      });

      if (filled === 81 && !hasError) {
        clearInterval(timerInterval);
        triggerConfetti();
        const score = Math.max(10000 - (secondsElapsed * 10) - (mistakes * 500), 500);
        document.getElementById('finalTime').innerText = document.getElementById('timer').innerText;
        document.getElementById('finalScore').innerText = `${score} PTS`;
        document.getElementById('winModal').style.display = 'flex';
      }
    }

    function resetGame() {
      mistakes = 0;
      secondsElapsed = 0;
      document.getElementById('mistakes').innerText = '0 / 3';
      renderBoard();
    }

    document.addEventListener('keydown', (e) => {
      if (e.key >= '1' && e.key <= '9') inputNumber(parseInt(e.key));
      if (e.key === 'Backspace' || e.key === 'Delete') eraseNumber();
    });

    window.onload = renderBoard;
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Midnight Sudoku</title>
  <style>
    /* Google Fonts for Serif & Monospace */
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..700;1,400..700&family=JetBrains+Mono:wght@400;600&display=swap');

    :root {
      --bg-color: #070B14;       /* Deep Midnight Navy */
      --card-bg: #0D1527;      /* Dark Slate Navy Card */
      --grid-border: #1E293B;  /* Fine Grid Borders */
      --grid-accent: #38BDF8;  /* Subtle Cyan Sub-grid Line */
      --text-primary: #FFFFFF; /* Pure White Numbers & Headings */
      --text-muted: #94A3B8;   /* Muted Serif Text */
      --accent-glow: #F1F5F9;  /* Cream White Accent */
      --cell-selected: #1E3A8A;/* Deep Blue Selected State */
      --cell-hover: #162035;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--bg-color);
      color: var(--text-primary);
      font-family: 'Times New Roman', Times, 'Playfair Display', serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .container {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Top Artwork & Header Visuals */
    .art-header {
      text-align: center;
      margin-bottom: 24px;
      border-bottom: 1px solid var(--grid-border);
      padding-bottom: 16px;
      width: 100%;
    }

    .art-illustration {
      font-family: monospace;
      font-size: 0.65rem;
      line-height: 1.1;
      color: var(--text-muted);
      white-space: pre;
      margin-bottom: 16px;
      opacity: 0.85;
    }

    .art-header h1 {
      font-family: 'Times New Roman', Times, serif;
      font-size: 1.35rem;
      font-weight: 400;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #FFFFFF;
      margin-bottom: 6px;
    }

    .art-header p {
      font-size: 0.8rem;
      font-style: italic;
      color: var(--text-muted);
      letter-spacing: 0.5px;
    }

    /* Stats Dashboard */
    .stats-bar {
      width: 100%;
      display: flex;
      justify-content: space-around;
      background: var(--card-bg);
      border: 1px solid var(--grid-border);
      border-radius: 4px;
      padding: 10px 16px;
      margin-bottom: 24px;
      font-family: 'Times New Roman', Times, serif;
    }

    .stat-item { text-align: center; }
    .stat-label { font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted); letter-spacing: 1px; }
    .stat-value { font-size: 1.1rem; font-family: 'JetBrains Mono', monospace; color: #FFFFFF; margin-top: 2px; }

    /* Sudoku Board Grid */
    .sudoku-grid {
      display: grid;
      grid-template-columns: repeat(9, 1fr);
      grid-template-rows: repeat(9, 1fr);
      width: 100%;
      aspect-ratio: 1 / 1;
      background-color: var(--grid-border);
      border: 2px solid var(--grid-accent);
      border-radius: 4px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
    }

    .cell {
      background-color: var(--card-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Times New Roman', Times, serif;
      font-size: 1.5rem;
      font-weight: 500;
      color: #FFFFFF; /* Pure White Numbers */
      cursor: pointer;
      user-select: none;
      transition: background 0.15s ease;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .cell:hover { background-color: var(--cell-hover); }
    .cell.selected { background-color: var(--cell-selected) !important; }
    .cell.given { color: #FFFFFF; font-weight: 600; }
    .cell.user-filled { color: var(--grid-accent); font-weight: 400; }
    .cell.error { color: #F87171; }

    /* Thick 3x3 Box Sub-Borders */
    .cell[data-col="2"], .cell[data-col="5"] { border-right: 2px solid var(--grid-accent); }
    .cell[data-row="2"], .cell[data-row="5"] { border-bottom: 2px solid var(--grid-accent); }

    /* Numpad Controls */
    .numpad {
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      gap: 6px;
      width: 100%;
      margin-top: 24px;
    }

    .num-btn {
      background: var(--card-bg);
      border: 1px solid var(--grid-border);
      color: #FFFFFF;
      padding: 10px 0;
      border-radius: 4px;
      font-family: 'Times New Roman', Times, serif;
      font-size: 1.1rem;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .num-btn:hover {
      border-color: var(--grid-accent);
      color: var(--grid-accent);
    }

    /* Completion Overlay */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(7, 11, 20, 0.95);
      backdrop-filter: blur(8px);
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .modal-card {
      background: var(--card-bg);
      border: 1px solid var(--grid-accent);
      padding: 32px;
      border-radius: 8px;
      text-align: center;
      max-width: 320px;
      color: #FFFFFF;
    }

    .modal-card h2 { font-size: 1.4rem; font-weight: 400; margin-bottom: 8px; }
    .score-highlight { font-size: 1.8rem; font-family: 'JetBrains Mono', monospace; margin: 16px 0; color: var(--grid-accent); }
  </style>
</head>
<body>

  <div class="container">
    <div class="art-header">
      <div class="art-illustration">
       .---.
      /     \
     |   .   |
     |  /|\  |
    /|   |   |\
   /_|___|___|_\
  ║  [===]  ║
  ║  | | |  ║
  ```━━━━━━━```
      </div>
      <h1>A PUZZLE A DAY KEEPS THE WRINKLES AWAY ®</h1>
      <p>Daily Midnight Sudoku • Resets automatically at 00:00 UTC</p>
    </div>

    <div class="stats-bar">
      <div class="stat-item">
        <div class="stat-label">Timer</div>
        <div class="stat-value" id="timer">00:00</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">Errors</div>
        <div class="stat-value" id="mistakes">0 / 3</div>
      </div>
    </div>

    <div class="sudoku-grid" id="board"></div>

    <div class="numpad">
      <button class="num-btn" onclick="inputNumber(1)">1</button>
      <button class="num-btn" onclick="inputNumber(2)">2</button>
      <button class="num-btn" onclick="inputNumber(3)">3</button>
      <button class="num-btn" onclick="inputNumber(4)">4</button>
      <button class="num-btn" onclick="inputNumber(5)">5</button>
      <button class="num-btn" onclick="inputNumber(6)">6</button>
      <button class="num-btn" onclick="inputNumber(7)">7</button>
      <button class="num-btn" onclick="inputNumber(8)">8</button>
      <button class="num-btn" onclick="inputNumber(9)">9</button>
      <button class="num-btn" onclick="eraseNumber()">⌫</button>
    </div>
  </div>

  <div class="modal-overlay" id="winModal">
    <div class="modal-card">
      <h2>Puzzle Solved</h2>
      <p>Time Elapsed: <span id="finalTime"></span></p>
      <div class="score-highlight" id="finalScore">0 PTS</div>
      <p style="font-size: 0.85rem; color: var(--text-muted);">Come back at midnight UTC for tomorrow's challenge.</p>
    </div>
  </div>

  <script>
    // Puzzle setup based on Reference Image
    const initialPuzzle = [
      [7, 0, 0, 1, 0, 3, 0, 9, 6],
      [3, 5, 0, 0, 6, 2, 0, 0, 7],
      [0, 6, 4, 7, 0, 0, 0, 5, 2],
      [4, 1, 5, 0, 0, 0, 6, 0, 0],
      [0, 9, 0, 0, 3, 0, 0, 4, 0],
      [0, 0, 3, 0, 0, 0, 5, 2, 8],
      [5, 4, 0, 0, 0, 9, 8, 1, 0],
      [9, 0, 0, 8, 1, 0, 0, 7, 5],
      [2, 8, 0, 3, 0, 5, 0, 0, 4]
    ];

    const solution = [
      [7, 2, 8, 1, 5, 3, 4, 9, 6],
      [3, 5, 9, 4, 6, 2, 1, 8, 7],
      [1, 6, 4, 7, 9, 8, 3, 5, 2],
      [4, 1, 5, 2, 8, 7, 6, 3, 9],
      [8, 9, 2, 6, 3, 1, 7, 4, 5],
      [6, 7, 3, 9, 4, 5, 5, 2, 8],
      [5, 4, 7, 6, 2, 9, 8, 1, 3],
      [9, 3, 6, 8, 1, 4, 2, 7, 5],
      [2, 8, 1, 3, 7, 5, 9, 6, 4]
    ];

    let selectedCell = null;
    let secondsElapsed = 0;
    let timerInterval = null;
    let mistakes = 0;

    function renderBoard() {
      const boardEl = document.getElementById('board');
      boardEl.innerHTML = '';

      for (let r = 0; r < 9; r++) {
        for (let c = 0; c < 9; c++) {
          const val = initialPuzzle[r][c];
          const cell = document.createElement('div');
          cell.classList.add('cell');
          cell.dataset.row = r;
          cell.dataset.col = c;

          if (val !== 0) {
            cell.innerText = val;
            cell.classList.add('given');
          } else {
            cell.addEventListener('click', () => selectCell(cell));
          }
          boardEl.appendChild(cell);
        }
      }
      startTimer();
    }

    function selectCell(cell) {
      if (selectedCell) selectedCell.classList.remove('selected');
      selectedCell = cell;
      selectedCell.classList.add('selected');
    }

    function inputNumber(num) {
      if (!selectedCell || selectedCell.classList.contains('given')) return;
      
      const r = parseInt(selectedCell.dataset.row);
      const c = parseInt(selectedCell.dataset.col);

      selectedCell.innerText = num;
      selectedCell.classList.add('user-filled');

      if (num !== solution[r][c]) {
        selectedCell.classList.add('error');
        mistakes++;
        document.getElementById('mistakes').innerText = `${mistakes} / 3`;
        if (mistakes >= 3) {
          alert('Game Over! Maximum errors reached.');
          resetGame();
        }
      } else {
        selectedCell.classList.remove('error');
        checkWin();
      }
    }

    function eraseNumber() {
      if (!selectedCell || selectedCell.classList.contains('given')) return;
      selectedCell.innerText = '';
      selectedCell.classList.remove('user-filled', 'error');
    }

    function startTimer() {
      clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        secondsElapsed++;
        const m = String(Math.floor(secondsElapsed / 60)).padStart(2, '0');
        const s = String(secondsElapsed % 60).padStart(2, '0');
        document.getElementById('timer').innerText = `${m}:${s}`;
      }, 1000);
    }

    function checkWin() {
      const cells = document.querySelectorAll('.cell');
      let filled = 0;
      let hasError = false;

      cells.forEach(c => {
        if (c.innerText !== '') filled++;
        if (c.classList.contains('error')) hasError = true;
      });

      if (filled === 81 && !hasError) {
        clearInterval(timerInterval);
        const score = Math.max(10000 - (secondsElapsed * 10) - (mistakes * 500), 500);
        document.getElementById('finalTime').innerText = document.getElementById('timer').innerText;
        document.getElementById('finalScore').innerText = `${score} PTS`;
        document.getElementById('winModal').style.display = 'flex';
      }
    }

    function resetGame() {
      mistakes = 0;
      secondsElapsed = 0;
      document.getElementById('mistakes').innerText = '0 / 3';
      renderBoard();
    }

    document.addEventListener('keydown', (e) => {
      if (e.key >= '1' && e.key <= '9') inputNumber(parseInt(e.key));
      if (e.key === 'Backspace' || e.key === 'Delete') eraseNumber();
    });

    renderBoard();
  </script>
</body>
</html>

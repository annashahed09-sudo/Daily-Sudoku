<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Midnight Sudoku</title>
  <style>
    :root {
      --bg-color: #0A0F1D;       /* Deep Navy Space */
      --card-bg: #111A2E;      /* Dark Slate Navy Card */
      --border-color: #23314E;  /* Grid & Card Borders */
      --grid-thick: #3B82F6;   /* Sub-grid 3x3 Border */
      --text-primary: #F8FAFC; /* Bright White */
      --text-muted: #94A3B8;   /* Muted Slate */
      --accent-glow: #38BDF8;  /* Cyan Neon Accent */
      --cell-selected: #1E3A8A;/* Cell Selection Blue */
      --cell-hover: #1E293B;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--bg-color);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .container {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .header-box {
      text-align: center;
      margin-bottom: 20px;
    }

    .header-box h1 {
      font-size: 1.5rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text-primary);
      margin-bottom: 6px;
    }

    .header-box p {
      font-size: 0.8rem;
      color: var(--text-muted);
      letter-spacing: 1px;
    }

    .stats-bar {
      width: 100%;
      display: flex;
      justify-content: space-around;
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 20px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
    }

    .stat-item { text-align: center; }
    .stat-label { font-size: 0.7rem; text-transform: uppercase; color: var(--text-muted); letter-spacing: 1px; }
    .stat-value { font-size: 1.15rem; font-weight: 700; color: var(--accent-glow); margin-top: 2px; }

    /* Sudoku Board Grid */
    .sudoku-grid {
      display: grid;
      grid-template-columns: repeat(9, 1fr);
      grid-template-rows: repeat(9, 1fr);
      width: 100%;
      aspect-ratio: 1 / 1;
      background-color: var(--border-color);
      border: 2px solid var(--accent-glow);
      border-radius: 6px;
      overflow: hidden;
      box-shadow: 0 0 30px rgba(56, 189, 248, 0.12);
    }

    .cell {
      background-color: var(--card-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--text-primary);
      cursor: pointer;
      user-select: none;
      transition: background 0.15s ease;
      border: 1px solid rgba(255, 255, 255, 0.03);
    }

    .cell:hover { background-color: var(--cell-hover); }
    .cell.selected { background-color: var(--cell-selected) !important; }
    .cell.given { color: var(--text-muted); cursor: not-allowed; font-weight: 400; }
    .cell.user-filled { color: var(--accent-glow); }
    .cell.error { color: #EF4444; }

    /* 3x3 Box Sub-Borders */
    .cell[data-col="2"], .cell[data-col="5"] { border-right: 2px solid var(--grid-thick); }
    .cell[data-row="2"], .cell[data-row="5"] { border-bottom: 2px solid var(--grid-thick); }

    /* Numpad Controls */
    .numpad {
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      gap: 6px;
      width: 100%;
      margin-top: 20px;
    }

    .num-btn {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      padding: 12px 0;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .num-btn:hover {
      border-color: var(--accent-glow);
      color: var(--accent-glow);
    }

    /* Modal Styling */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(10, 15, 29, 0.92);
      backdrop-filter: blur(8px);
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .modal-card {
      background: var(--card-bg);
      border: 1px solid var(--accent-glow);
      padding: 32px;
      border-radius: 12px;
      text-align: center;
      max-width: 320px;
      box-shadow: 0 0 40px rgba(56, 189, 248, 0.2);
    }

    .modal-card h2 { color: var(--accent-glow); margin-bottom: 8px; font-size: 1.4rem; }
    .modal-card p { color: var(--text-muted); font-size: 0.9rem; margin-top: 6px; }
    .score-highlight { font-size: 1.8rem; font-weight: bold; color: var(--text-primary); margin: 16px 0; }
  </style>
</head>
<body>

  <div class="container">
    <div class="header-box">
      <h1>Daily Midnight Sudoku</h1>
      <p>A PUZZLE A DAY KEEPS THE WRINKLES AWAY • RESETS 00:00 UTC</p>
    </div>

    <div class="stats-bar">
      <div class="stat-item">
        <div class="stat-label">Timer</div>
        <div class="stat-value" id="timer">00:00</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">Errors</div>
        <div class="stat-value" id="mistakes">0 / 3</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">Status</div>
        <div class="stat-value" id="game-status" style="color: var(--text-primary);">Playing</div>
      </div>
    </div>

    <div class="sudoku-grid" id="board"></div>

    <div class="numpad">
      <button class="num-btn" onclick="inputNumber(1)">1</button>
      <button class="num-btn" onclick="inputNumber(2)">2</button>
      <button class="num-btn" onclick="inputNumber(3)">3</button>
      <button class="num-btn" onclick="inputNumber(4)">4</button>
      <button class="num-btn" onclick="inputNumber(5)">5</button>
      <button class="num-btn" onclick="inputNumber(6)">6</button>
      <button class="num-btn" onclick="inputNumber(7)">7</button>
      <button class="num-btn" onclick="inputNumber(8)">8</button>
      <button class="num-btn" onclick="inputNumber(9)">9</button>
      <button class="num-btn" onclick="eraseNumber()">⌫</button>
    </div>
  </div>

  <div class="modal-overlay" id="winModal">
    <div class="modal-card">
      <h2>Puzzle Completed! 🎉</h2>
      <p>Time Taken: <span id="finalTime" style="color: #fff;"></span></p>
      <div class="score-highlight" id="finalScore">0 PTS</div>
      <p>Come back tomorrow at midnight UTC for a new board!</p>
    </div>
  </div>

  <script>
    // Sample Daily Puzzle Seed (Image #2 exact puzzle structure)
    const initialPuzzle = [
      [7, 0, 0, 1, 0, 3, 0, 9, 6],
      [3, 5, 0, 0, 6, 2, 0, 0, 7],
      [0, 6, 4, 7, 0, 0, 0, 5, 2],
      [4, 1, 5, 0, 0, 0, 6, 0, 0],
      [0, 9, 0, 0, 3, 0, 0, 4, 0],
      [0, 0, 3, 0, 0, 0, 5, 2, 8],
      [5, 4, 0, 0, 0, 9, 8, 1, 0],
      [9, 0, 0, 8, 1, 0, 0, 7, 5],
      [2, 8, 0, 3, 0, 5, 0, 0, 4]
    ];

    const solution = [
      [7, 2, 8, 1, 5, 3, 4, 9, 6],
      [3, 5, 9, 4, 6, 2, 1, 8, 7],
      [1, 6, 4, 7, 9, 8, 3, 5, 2],
      [4, 1, 5, 2, 8, 7, 6, 3, 9],
      [8, 9, 2, 6, 3, 1, 7, 4, 5],
      [6, 7, 3, 9, 4, 5, 5, 2, 8],
      [5, 4, 7, 6, 2, 9, 8, 1, 3],
      [9, 3, 6, 8, 1, 4, 2, 7, 5],
      [2, 8, 1, 3, 7, 5, 9, 6, 4]
    ];

    let selectedCell = null;
    let secondsElapsed = 0;
    let timerInterval = null;
    let mistakes = 0;

    function renderBoard() {
      const boardEl = document.getElementById('board');
      boardEl.innerHTML = '';

      for (let r = 0; r < 9; r++) {
        for (let c = 0; c < 9; c++) {
          const val = initialPuzzle[r][c];
          const cell = document.createElement('div');
          cell.classList.add('cell');
          cell.dataset.row = r;
          cell.dataset.col = c;

          if (val !== 0) {
            cell.innerText = val;
            cell.classList.add('given');
          } else {
            cell.addEventListener('click', () => selectCell(cell));
          }
          boardEl.appendChild(cell);
        }
      }
      startTimer();
    }

    function selectCell(cell) {
      if (selectedCell) selectedCell.classList.remove('selected');
      selectedCell = cell;
      selectedCell.classList.add('selected');
    }

    function inputNumber(num) {
      if (!selectedCell || selectedCell.classList.contains('given')) return;
      
      const r = parseInt(selectedCell.dataset.row);
      const c = parseInt(selectedCell.dataset.col);

      selectedCell.innerText = num;
      selectedCell.classList.add('user-filled');

      if (num !== solution[r][c]) {
        selectedCell.classList.add('error');
        mistakes++;
        document.getElementById('mistakes').innerText = `${mistakes} / 3`;
        if (mistakes >= 3) {
          alert('Game Over! You made 3 mistakes.');
          resetGame();
        }
      } else {
        selectedCell.classList.remove('error');
        checkWin();
      }
    }

    function eraseNumber() {
      if (!selectedCell || selectedCell.classList.contains('given')) return;
      selectedCell.innerText = '';
      selectedCell.classList.remove('user-filled', 'error');
    }

    function startTimer() {
      clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        secondsElapsed++;
        const m = String(Math.floor(secondsElapsed / 60)).padStart(2, '0');
        const s = String(secondsElapsed % 60).padStart(2, '0');
        document.getElementById('timer').innerText = `${m}:${s}`;
      }, 1000);
    }

    function checkWin() {
      const cells = document.querySelectorAll('.cell');
      let filled = 0;
      let hasError = false;

      cells.forEach(c => {
        if (c.innerText !== '') filled++;
        if (c.classList.contains('error')) hasError = true;
      });

      if (filled === 81 && !hasError) {
        clearInterval(timerInterval);
        const calculatedScore = Math.max(10000 - (secondsElapsed * 12) - (mistakes * 500), 500);
        document.getElementById('finalTime').innerText = document.getElementById('timer').innerText;
        document.getElementById('finalScore').innerText = `${calculatedScore} PTS`;
        document.getElementById('winModal').style.display = 'flex';
      }
    }

    function resetGame() {
      mistakes = 0;
      secondsElapsed = 0;
      document.getElementById('mistakes').innerText = '0 / 3';
      renderBoard();
    }

    // Keyboard Support
    document.addEventListener('keydown', (e) => {
      if (e.key >= '1' && e.key <= '9') inputNumber(parseInt(e.key));
      if (e.key === 'Backspace' || e.key === 'Delete') eraseNumber();
    });

    renderBoard();
  </script>
</body>
</html>

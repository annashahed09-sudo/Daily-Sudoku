<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Midnight Sudoku</title>
  <style>
    :root {
      --bg-color: #060A17;       /* Deep Navy */
      --card-bg: #0D1527;      /* Slate Navy Box */
      --grid-border: #1E293B;  /* Cell Border */
      --grid-accent: #38BDF8;  /* 3x3 Line Accent */
      --text-primary: #FFFFFF; /* Pure White Numbers */
      --text-muted: #94A3B8;   /* Muted Text */
      --cell-selected: #1E3A8A;/* Selected Cell */
      --cell-hover: #162035;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--bg-color);
      color: var(--text-primary);
      font-family: 'Times New Roman', Times, serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .container {
      width: 100%;
      max-width: 460px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Header & Vector Lighthouse Design */
    .art-header {
      text-align: center;
      margin-bottom: 20px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .lighthouse-svg {
      width: 120px;
      height: 120px;
      margin-bottom: 12px;
      filter: drop-shadow(0 0 12px rgba(56, 189, 248, 0.3));
    }

    .art-header h1 {
      font-family: 'Times New Roman', Times, serif;
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: #FFFFFF;
      margin-bottom: 6px;
    }

    .art-header p {
      font-size: 0.85rem;
      font-style: italic;
      color: var(--text-muted);
      letter-spacing: 0.5px;
    }

    /* Stats Dashboard */
    .stats-bar {
      width: 100%;
      display: flex;
      justify-content: space-around;
      background: var(--card-bg);
      border: 1px solid var(--grid-border);
      border-radius: 4px;
      padding: 10px 16px;
      margin-bottom: 20px;
    }

    .stat-item { text-align: center; }
    .stat-label { font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted); letter-spacing: 1px; }
    .stat-value { font-size: 1.15rem; font-family: 'Times New Roman', Times, serif; font-weight: bold; color: #FFFFFF; margin-top: 2px; }

    /* Sudoku Board Grid */
    .sudoku-grid {
      display: grid;
      grid-template-columns: repeat(9, 1fr);
      grid-template-rows: repeat(9, 1fr);
      width: 100%;
      aspect-ratio: 1 / 1;
      background-color: var(--grid-border);
      border: 2px solid var(--grid-accent);
      border-radius: 4px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
    }

    .cell {
      background-color: var(--card-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Times New Roman', Times, serif;
      font-size: 1.6rem;
      font-weight: bold;
      color: #FFFFFF !important; /* Forces Pure White Numbers */
      cursor: pointer;
      user-select: none;
      transition: background 0.15s ease;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .cell:hover { background-color: var(--cell-hover); }
    .cell.selected { background-color: var(--cell-selected) !important; }
    .cell.given { color: #FFFFFF !important; }
    .cell.user-filled { color: var(--grid-accent) !important; font-weight: normal; }
    .cell.error { color: #EF4444 !important; }

    /* 3x3 Sub-Grid Borders */
    .cell[data-col="2"], .cell[data-col="5"] { border-right: 2px solid var(--grid-accent); }
    .cell[data-row="2"], .cell[data-row="5"] { border-bottom: 2px solid var(--grid-accent); }

    /* Numpad Controls */
    .numpad {
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      gap: 6px;
      width: 100%;
      margin-top: 20px;
    }

    .num-btn {
      background: var(--card-bg);
      border: 1px solid var(--grid-border);
      color: #FFFFFF;
      padding: 12px 0;
      border-radius: 4px;
      font-family: 'Times New Roman', Times, serif;
      font-size: 1.2rem;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .num-btn:hover {
      border-color: var(--grid-accent);
      color: var(--grid-accent);
    }

    /* Win Overlay */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(6, 10, 23, 0.95);
      backdrop-filter: blur(8px);
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .modal-card {
      background: var(--card-bg);
      border: 1px solid var(--grid-accent);
      padding: 32px;
      border-radius: 8px;
      text-align: center;
      max-width: 320px;
      color: #FFFFFF;
    }

    .modal-card h2 { font-size: 1.4rem; font-weight: normal; margin-bottom: 8px; }
    .score-highlight { font-size: 1.8rem; margin: 16px 0; color: var(--grid-accent); }
  </style>
</head>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Midnight Sudoku</title>
  <style>
    :root {
      --bg-color: #050814;        /* Dark Space Navy */
      --card-bg: #0A1020;         /* Vintage Dark Slate Card */
      --grid-border: #1E293B;     /* Cell Division Border */
      --grid-accent: #38BDF8;     /* Cyan Line Accent */
      --text-white: #FFFFFF;      /* Crisp White Numbers */
      --text-muted: #94A3B8;      /* Soft Grey Serif Subtext */
      --cell-selected: #1E3A8A;   /* Selected Cell Highlight */
      --cell-hover: #111B30;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--bg-color) !important;
      color: var(--text-white);
      font-family: 'Times New Roman', Times, serif !important;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .container {
      width: 100%;
      max-width: 460px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Top Artwork & Header Visuals */
    .art-header {
      text-align: center;
      margin-bottom: 22px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* SVG Lighthouse Graphic */
    .lighthouse-svg {
      width: 120px;
      height: 120px;
      margin-bottom: 14px;
      filter: drop-shadow(0 0 16px rgba(56, 189, 248, 0.35));
    }

    /* Title & Quote in Italics */
    .art-header h1 {
      font-family: 'Times New Roman', Times, serif !important;
      font-size: 1.25rem;
      font-weight: normal;
      font-style: italic !important;
      letter-spacing: 1.5px;
      color: #FFFFFF;
      margin-bottom: 6px;
    }

    .art-header p {
      font-family: 'Times New Roman', Times, serif !important;
      font-size: 0.85rem;
      font-style: italic !important;
      color: var(--text-muted);
      letter-spacing: 0.5px;
    }

    /* Stats Dashboard */
    .stats-bar {
      width: 100%;
      display: flex;
      justify-content: space-around;
      background: var(--card-bg);
      border: 1px solid var(--grid-border);
      border-radius: 4px;
      padding: 10px 16px;
      margin-bottom: 22px;
      font-family: 'Times New Roman', Times, serif !important;
    }

    .stat-item { text-align: center; }
    .stat-label { font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted); letter-spacing: 1px; }
    .stat-value { font-size: 1.15rem; font-weight: bold; color: #FFFFFF; margin-top: 2px; }

    /* Sudoku Grid */
    .sudoku-grid {
      display: grid;
      grid-template-columns: repeat(9, 1fr);
      grid-template-rows: repeat(9, 1fr);
      width: 100%;
      aspect-ratio: 1 / 1;
      background-color: var(--grid-border);
      border: 2px solid var(--grid-accent);
      border-radius: 4px;
      overflow: hidden;
      box-shadow: 0 12px 35px rgba(0, 0, 0, 0.7);
    }

    .cell {
      background-color: var(--card-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Times New Roman', Times, serif !important;
      font-size: 1.6rem;
      font-weight: bold;
      color: #FFFFFF !important; /* Pure White Numbers */
      cursor: pointer;
      user-select: none;
      transition: background 0.15s ease;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .cell:hover { background-color: var(--cell-hover); }
    .cell.selected { background-color: var(--cell-selected) !important; }
    .cell.given { color: #FFFFFF !important; }
    .cell.user-filled { color: var(--grid-accent) !important; font-weight: normal; }
    .cell.error { color: #EF4444 !important; }

    /* 3x3 Sub-Grid Borders */
    .cell[data-col="2"], .cell[data-col="5"] { border-right: 2px solid var(--grid-accent); }
    .cell[data-row="2"], .cell[data-row="5"] { border-bottom: 2px solid var(--grid-accent); }

    /* Numpad Controls */
    .numpad {
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      gap: 6px;
      width: 100%;
      margin-top: 22px;
    }

    .num-btn {
      background: var(--card-bg);
      border: 1px solid var(--grid-border);
      color: #FFFFFF;
      padding: 12px 0;
      border-radius: 4px;
      font-family: 'Times New Roman', Times, serif !important;
      font-size: 1.2rem;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .num-btn:hover {
      border-color: var(--grid-accent);
      color: var(--grid-accent);
    }

    /* Modal Overlay */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(5, 8, 20, 0.95);
      backdrop-filter: blur(8px);
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .modal-card {
      background: var(--card-bg);
      border: 1px solid var(--grid-accent);
      padding: 32px;
      border-radius: 8px;
      text-align: center;
      max-width: 320px;
      color: #FFFFFF;
      font-family: 'Times New Roman', Times, serif !important;
    }

    .modal-card h2 { font-size: 1.4rem; font-style: italic; margin-bottom: 8px; }
    .score-highlight { font-size: 1.8rem; margin: 16px 0; color: var(--grid-accent); }
  </style>
</head>
<body>

  <div class="container">
    <div class="art-header">
      <svg class="lighthouse-svg" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <polygon points="50,28 5,2 95,2" fill="rgba(56, 189, 248, 0.2)" />
        <polygon points="50,28 0,38 100,38" fill="rgba(56, 189, 248, 0.12)" />
        
        <circle cx="50" cy="28" r="5" fill="#38BDF8" />
        
        <path d="M42 34 H58 V42 H42 Z" stroke="#FFFFFF" stroke-width="2" fill="#0A1020" />
        <path d="M40 34 L50 20 L60 34 Z" fill="#FFFFFF" />
        <line x1="42" y1="38" x2="58" y2="38" stroke="#38BDF8" stroke-width="1.5" />

        <path d="M43 42 L37 86 H63 L57 42 Z" stroke="#FFFFFF" stroke-width="2" fill="#0A1020" />
        <path d="M41.5 53 H58.5 M40 66 H60 M38.5 79 H61.5" stroke="#FFFFFF" stroke-width="2" />
        
        <path d="M28 86 H72 V93 H28 Z" fill="#FFFFFF" />
        <path d="M18 93 C35 91, 65 91, 82 93 L88 97 H12 Z" fill="#1E293B" />
      </svg>

      <h1>“A puzzle a day keeps the wrinkles away ®”</h1>
      <p>Daily Midnight Sudoku • Resets automatically at 00:00 UTC</p>
    </div>

    <div class="stats-bar">
      <div class="stat-item">
        <div class="stat-label">Timer</div>
        <div class="stat-value" id="timer">00:00</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">Errors</div>
        <div class="stat-value" id="mistakes">0 / 3</div>
      </div>
    </div>
    
    <div class="sudoku-grid" id="board"></div>

    <div class="numpad">
      <button class="num-btn" onclick="inputNumber(1)">1</button>
      <button class="num-btn" onclick="inputNumber(2)">2</button>
      <button class="num-btn" onclick="inputNumber(3)">3</button>
      <button class="num-btn" onclick="inputNumber(4)">4</button>
      <button class="num-btn" onclick="inputNumber(5)">5</button>
